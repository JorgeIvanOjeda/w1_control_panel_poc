<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W1 BMX Club - Registro Familiar</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #1a73e8; text-align: center; margin-bottom: 30px; }
        
        /* Sección Formulario */
        .seccion-registro { background: #fff; border: 1px solid #e0e0e0; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        .grid-responsable { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 13px; font-weight: bold; color: #666; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        
        .area-hijos { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px dashed #bbb; }
        .hijo-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-end; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add { background: #34a853; color: white; margin-top: 10px; }
        .btn-save { background: #1a73e8; color: white; width: 100%; margin-top: 20px; font-size: 16px; }
        
        /* Dashboard */
        .card { background: white; border: 1px solid #eee; border-left: 6px solid #ccc; padding: 15px; margin-bottom: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .card.verde { border-left-color: #34a853; }
        .card.rojo { border-left-color: #ea4335; }
        .info-p { font-size: 14px; color: #555; margin: 2px 0; }
        .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; color: white; font-weight: bold; }
        
        .notificacion-toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 15px 25px; border-radius: 8px; display: none; z-index: 1000; }
    </style>
</head>
<body>

<div id="toast" class="notificacion-toast">Simulando envío de correo...</div>

<div class="container">
    <h1>W1 BMX Club - Registro Centralizado</h1>

    <div class="seccion-registro">
        <h3 style="margin-top:0;">1. Datos del Responsable (Padre/Madre)</h3>
        <div class="grid-responsable">
            <div class="input-group">
                <label>Nombre Completo</label>
                <input type="text" id="respNombre" placeholder="Ej. Juan Pérez">
            </div>
            <div class="input-group">
                <label>Cédula / ID</label>
                <input type="text" id="respCedula" placeholder="12345678">
            </div>
            <div class="input-group">
                <label>Teléfono (WhatsApp)</label>
                <input type="text" id="respTel" placeholder="+57 300...">
            </div>
            <div class="input-group">
                <label>Email para Notificaciones</label>
                <input type="email" id="respEmail" placeholder="juan@email.com">
            </div>
        </div>

        <h3>2. Alumnos a Inscribir</h3>
        <div id="contenedorHijos" class="area-hijos">
            <div class="hijo-row">
                <div class="input-group" style="flex:2;">
                    <label>Nombre del Alumno (Hijo/a o Usted mismo)</label>
                    <input type="text" class="hijo-nombre" placeholder="Nombre del piloto">
                </div>
                <div class="input-group" style="flex:1;">
                    <label>Paquete Inicial</label>
                    <select class="hijo-paquete">
                        <option value="1">Clase Individual</option>
                        <option value="4">Paquete x4</option>
                        <option value="8" selected>Paquete x8</option>
                        <option value="12">Paquete x12</option>
                    </select>
                </div>
            </div>
        </div>
        <button type="button" class="btn btn-add" id="btnAddHijo">+ Añadir otro Alumno</button>
        
        <button type="button" class="btn btn-save" id="btnGuardarTodo">Finalizar Registro y Notificar</button>
    </div>

    <hr>

    <h2>Panel Operativo (Pilotos Activos)</h2>
    <div id="lista-pilotos">Cargando datos...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCX8gmekHpSVtvMxsnbBV7-kxD4VZoS6XM",
      authDomain: "club-ciclismo-w1.firebaseapp.com",
      projectId: "club-ciclismo-w1",
      storageBucket: "club-ciclismo-w1.firebasestorage.app",
      messagingSenderId: "726347754629",
      appId: "1:726347754629:web:19a0e8a76153ff14dfcdec"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const pilotosRef = collection(db, "pilotos_v2"); // Nueva versión para estructura familiar

    // Dinamismo: Añadir más filas de hijos
    document.getElementById('btnAddHijo').addEventListener('click', () => {
        const div = document.createElement('div');
        div.className = 'hijo-row';
        div.innerHTML = `
            <div class="input-group" style="flex:2;">
                <input type="text" class="hijo-nombre" placeholder="Nombre del otro hijo">
            </div>
            <div class="input-group" style="flex:1;">
                <select class="hijo-paquete">
                    <option value="1">Clase Individual</option>
                    <option value="4">Paquete x4</option>
                    <option value="8" selected>Paquete x8</option>
                    <option value="12">Paquete x12</option>
                </select>
            </div>
        `;
        document.getElementById('contenedorHijos').appendChild(div);
    });

    // Guardar TODO el grupo familiar
    document.getElementById('btnGuardarTodo').addEventListener('click', async () => {
        const resp = {
            nombre: document.getElementById('respNombre').value,
            cedula: document.getElementById('respCedula').value,
            tel: document.getElementById('respTel').value,
            email: document.getElementById('respEmail').value
        };

        if(!resp.nombre || !resp.email) return alert("Por favor completa los datos del responsable");

        const hijosNombres = document.querySelectorAll('.hijo-nombre');
        const hijosPaquetes = document.querySelectorAll('.hijo-paquete');

        document.getElementById('btnGuardarTodo').innerText = "Procesando...";

        for(let i=0; i < hijosNombres.length; i++) {
            const nombreHijo = hijosNombres[i].value.trim();
            if(nombreHijo !== "") {
                await addDoc(pilotosRef, {
                    alumno: nombreHijo,
                    responsable_nombre: resp.nombre,
                    responsable_email: resp.email,
                    responsable_tel: resp.tel,
                    responsable_cedula: resp.cedula,
                    clases_restantes: parseInt(hijosPaquetes[i].value),
                    paquete_tipo: hijosPaquetes[i].value,
                    ultima_asistencia: new Date().toISOString()
                });
            }
        }

        // Simulación de notificación
        const toast = document.getElementById('toast');
        toast.innerText = `📧 Correo de bienvenida enviado a: ${resp.email}`;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 5000);

        // Reset
        document.getElementById('respNombre').value = "";
        document.getElementById('respCedula').value = "";
        document.getElementById('contenedorHijos').innerHTML = `<div class="hijo-row"><div class="input-group" style="flex:2;"><label>Nombre del Alumno</label><input type="text" class="hijo-nombre"></div><div class="input-group" style="flex:1;"><label>Paquete</label><select class="hijo-paquete"><option value="1">Individual</option><option value="4">x4</option><option value="8" selected>x8</option><option value="12">x12</option></select></div></div>`;
        document.getElementById('btnGuardarTodo').innerText = "Finalizar Registro y Notificar";
    });

    // Dashboard en tiempo real
    onSnapshot(pilotosRef, (snapshot) => {
        const lista = document.getElementById('lista-pilotos');
        lista.innerHTML = '';
        
        snapshot.forEach(docSnap => {
            const d = docSnap.data();
            const id = docSnap.id;
            const colorClass = d.clases_restantes > 2 ? 'verde' : 'rojo';

            const div = document.createElement('div');
            div.className = `card ${colorClass}`;
            div.innerHTML = `
                <div>
                    <div style="font-weight:bold; font-size:16px;">${d.alumno}</div>
                    <div class="info-p">Responsable: ${d.responsable_nombre}</div>
                    <div class="info-p">📧 ${d.responsable_email} | 📱 ${d.responsable_tel}</div>
                </div>
                <div style="text-align:right;">
                    <div style="font-size:20px; font-weight:bold;">${d.clases_restantes} <small style="font-size:10px;">clases</small></div>
                    <button class="btn" style="background:#eee; font-size:11px;" onclick="window.checkin('${id}', ${d.clases_restantes}, '${d.responsable_email}')">
                        Hacer Check-in
                    </button>
                </div>
            `;
            lista.appendChild(div);
        });
    });

    // Función Global para Check-in
    window.checkin = async (id, actual, email) => {
        if(actual > 0) {
            await updateDoc(doc(db, "pilotos_v2", id), { clases_restantes: actual - 1 });
            const toast = document.getElementById('toast');
            toast.innerText = `✅ Check-in exitoso. Notificación enviada a ${email}`;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        } else {
            alert("Sin saldo. El responsable debe renovar el paquete.");
        }
    };

</script>
</body>
</html>
